services:
  - type: web
    name: signal-theory-backend
    runtime: docker
    plan: starter
    region: oregon
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: signal-theory-db
          property: connectionString

databases:
  - name: signal-theory-db
    plan: free
