<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Theory - AI Dating Coach</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f7f9fc;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #667eea;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { min-height: 120px; resize: vertical; font-family: inherit; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active { transform: translateY(0); }
        .output {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e6ed;
            font-size: 14px;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }
        .output.success { border-color: #10b981; background: #f0fdf4; }
        .output.error { border-color: #ef4444; background: #fef2f2; }
        .status { margin-top: 10px; font-size: 13px; color: #6b7280; }
        .advice {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left-color: #f59e0b;
            margin-top: 15px;
            padding: 20px;
            border-radius: 12px;
        }
        .advice h3 {
            color: #92400e;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .advice p {
            color: #78350f;
            line-height: 1.8;
            margin: 8px 0;
        }
        .label { font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Signal Theory</h1>
            <p>AI-Powered Dating Coach • Live Demo</p>
        </div>
        
        <div class="content">
            <!-- Registration -->
            <div class="section">
                <h2>1️⃣ Create Account</h2>
                <input type="email" id="regEmail" placeholder="Email" value="test@example.com">
                <input type="password" id="regPassword" placeholder="Password" value="TestPass123!">
                <input type="text" id="regName" placeholder="Display Name" value="Test User">
                <button onclick="register()">Register</button>
                <div id="regOutput" class="output hidden"></div>
            </div>

            <!-- Login -->
            <div class="section">
                <h2>2️⃣ Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" value="test@example.com">
                <input type="password" id="loginPassword" placeholder="Password" value="TestPass123!">
                <button onclick="login()">Login</button>
                <div id="loginOutput" class="output hidden"></div>
            </div>

            <!-- Analysis -->
            <div class="section">
                <h2>3️⃣ Get Dating Advice</h2>
                <label class="label">Describe your situation:</label>
                <textarea id="analysisText" placeholder="Example: She said 'we should hang out sometime' but hasn't responded to my follow-up text...">She said "we should hang out sometime" but hasn't responded to my follow-up text for 2 days. Should I text again or wait?</textarea>
                <button onclick="analyze()">Analyze with AI</button>
                <div id="analysisOutput" class="output hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://signal-theory-backend.onrender.com/api';
        let token = '';

        function showOutput(id, content, type = '') {
            const el = document.getElementById(id);
            el.innerHTML = content;
            el.className = 'output ' + type;
            el.classList.remove('hidden');
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const display_name = document.getElementById('regName').value;

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, display_name })
                });

                const data = await res.json();

                if (res.ok) {
                    token = data.access_token;
                    showOutput('regOutput', `
                        <strong>✅ Account created!</strong><br>
                        User ID: ${data.user.user_id}<br>
                        Email: ${data.user.email}<br>
                        <div class="status">You're now logged in and ready to use the AI.</div>
                    `, 'success');
                    
                    // Auto-fill login
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = password;
                } else {
                    showOutput('regOutput', `<strong>❌ Error:</strong> ${data.error || 'Registration failed'}`, 'error');
                }
            } catch (err) {
                showOutput('regOutput', `<strong>❌ Network error:</strong> ${err.message}`, 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    token = data.access_token;
                    showOutput('loginOutput', `
                        <strong>✅ Logged in!</strong><br>
                        Email: ${data.user.email}<br>
                        <div class="status">Token saved. You can now get AI advice.</div>
                    `, 'success');
                } else {
                    showOutput('loginOutput', `<strong>❌ Error:</strong> ${data.error || 'Login failed'}`, 'error');
                }
            } catch (err) {
                showOutput('loginOutput', `<strong>❌ Network error:</strong> ${err.message}`, 'error');
            }
        }

        async function analyze() {
            if (!token) {
                showOutput('analysisOutput', '<strong>❌ Please login first!</strong>', 'error');
                return;
            }

            const input_text = document.getElementById('analysisText').value;

            showOutput('analysisOutput', '🤔 Analyzing with Claude AI...', '');

            try {
                const res = await fetch(`${API}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ input_text })
                });

                const data = await res.json();

                if (res.ok) {
                    const advice = data.analysis;
                    showOutput('analysisOutput', `
                        <div class="advice">
                            <h3>🔥 ${advice.signal_state} Signal</h3>
                            <p><strong>What I See:</strong><br>${advice.what_i_see}</p>
                            <p><strong>What It Means:</strong><br>${advice.what_it_means}</p>
                            <p><strong>Your Move:</strong><br>${advice.your_move}</p>
                            <p><strong>Watch For:</strong><br>${advice.watch_for}</p>
                        </div>
                    `, 'success');
                } else {
                    showOutput('analysisOutput', `<strong>❌ Error:</strong> ${data.error || 'Analysis failed'}`, 'error');
                }
            } catch (err) {
                showOutput('analysisOutput', `<strong>❌ Network error:</strong> ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
