<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Theory - AI Dating Coach</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f7f9fc;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #667eea;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { min-height: 120px; resize: vertical; font-family: inherit; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active { transform: translateY(0); }
        .output {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e6ed;
            font-size: 14px;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }
        .output.success { border-color: #10b981; background: #f0fdf4; }
        .output.error { border-color: #ef4444; background: #fef2f2; }
        .status { margin-top: 10px; font-size: 13px; color: #6b7280; }
        .advice {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left-color: #f59e0b;
            margin-top: 15px;
            padding: 20px;
            border-radius: 12px;
        }
        .advice h3 {
            color: #92400e;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .advice p {
            color: #78350f;
            line-height: 1.8;
            margin: 8px 0;
        }
        .label { font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
        .hidden { display: none; }
        .toggle-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
        .toggle-link:hover { color: #764ba2; }
        .logout-bar {
            text-align: right;
            padding: 0 0 10px 0;
        }
        .logout-link {
            color: #9ca3af;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }
        .logout-link:hover { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Signal Theory</h1>
            <p>AI-Powered Dating Coach • Live Demo</p>
        </div>

        <div class="content">
            <!-- Auth section (shown until logged in) -->
            <div id="authSection">

                <!-- Sign Up Form -->
                <div id="signupForm" class="section">
                    <h2>Create Account</h2>
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Password">
                    <input type="text" id="regName" placeholder="Display Name">
                    <button onclick="register()">Sign Up</button>
                    <div id="regOutput" class="output hidden"></div>
                    <span class="toggle-link" onclick="showLogin()">Have an account? Log in</span>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="section hidden">
                    <h2>Log In</h2>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button onclick="login()">Log In</button>
                    <div id="loginOutput" class="output hidden"></div>
                    <span class="toggle-link" onclick="showSignup()">New user? Sign up</span>
                </div>

            </div>

            <!-- Analysis (shown after login) -->
            <div id="analysisSection" class="section hidden">
                <div class="logout-bar"><span class="logout-link" onclick="logout()">Log out</span></div>
                <h2>Get Dating Advice</h2>
                <label class="label">Describe your situation:</label>
                <textarea id="analysisText" placeholder="Example: She said 'we should hang out sometime' but hasn't responded to my follow-up text..."></textarea>
                <button onclick="analyze()">Analyze with AI</button>
                <div id="analysisOutput" class="output hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://signal-theory-backend.onrender.com/api';
        let token = localStorage.getItem('signal_theory_token') || '';

        // On page load, if we have a token already, skip auth
        if (token) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('analysisSection').classList.remove('hidden');
        }

        function showOutput(id, content, type = '') {
            const el = document.getElementById(id);
            el.innerHTML = content;
            el.className = 'output ' + type;
            el.classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
        }

        function onAuthSuccess(newToken) {
            token = newToken;
            localStorage.setItem('signal_theory_token', newToken);
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('analysisSection').classList.remove('hidden');
            document.getElementById('analysisSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function logout() {
            token = '';
            localStorage.removeItem('signal_theory_token');
            document.getElementById('analysisSection').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const display_name = document.getElementById('regName').value;

            try {
                const res = await fetch(`${API}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, display_name })
                });

                const data = await res.json();

                if (res.ok) {
                    onAuthSuccess(data.access_token);
                } else {
                    showOutput('regOutput', `<strong>❌ Error:</strong> ${data.error || 'Registration failed'}`, 'error');
                }
            } catch (err) {
                showOutput('regOutput', `<strong>❌ Network error:</strong> ${err.message}`, 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    onAuthSuccess(data.access_token);
                } else {
                    showOutput('loginOutput', `<strong>❌ Error:</strong> ${data.error || 'Login failed'}`, 'error');
                }
            } catch (err) {
                showOutput('loginOutput', `<strong>❌ Network error:</strong> ${err.message}`, 'error');
            }
        }

        async function analyze() {
            const input_text = document.getElementById('analysisText').value;
            if (!input_text.trim()) return;

            showOutput('analysisOutput', '🤔 Analyzing with Claude AI...', '');

            try {
                const res = await fetch(`${API}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ input_text })
                });

                const data = await res.json();

                if (res.ok) {
                    const advice = data.analysis;
                    showOutput('analysisOutput', `
                        <div class="advice">
                            <h3>🔥 ${advice.signal_state} Signal</h3>
                            <p><strong>What I See:</strong><br>${advice.what_i_see}</p>
                            <p><strong>What It Means:</strong><br>${advice.what_it_means}</p>
                            <p><strong>Your Move:</strong><br>${advice.your_move}</p>
                            <p><strong>Watch For:</strong><br>${advice.watch_for}</p>
                        </div>
                    `, 'success');
                } else {
                    showOutput('analysisOutput', `<strong>❌ Error:</strong> ${data.error || 'Analysis failed'}`, 'error');
                }
            } catch (err) {
                showOutput('analysisOutput', `<strong>❌ Network error:</strong> ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
