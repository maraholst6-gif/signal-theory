<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Here: Your Profile — Signal Theory</title>
<meta name="description" content="Discover your readiness profile and get a personalized action plan for reading signals more clearly.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333;
  --border: #3a3a3a;
  --text: #f5f5f5;
  --muted: #a0a0a0;
  --accent: #FF6B35;
  --accent-hover: #e55a25;
  --green-bg: rgba(16,185,129,0.12);
  --green-border: rgba(16,185,129,0.3);
  --green-text: #6ee7b7;
  --amber-bg: rgba(245,158,11,0.12);
  --amber-border: rgba(245,158,11,0.3);
  --amber-text: #fcd34d;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app-shell {
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.app-header {
  background: var(--surface);
  padding: 16px 24px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  border-bottom: 2px solid var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.app-header h1 { font-size: 20px; font-weight: 700; }
.header-back {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 0;
  display: none;
}
.header-back.visible { display: block; }

/* Main content */
.main-content {
  flex: 1;
  padding: 16px;
  padding-bottom: 32px;
}

/* ===== SELECTOR SCREEN ===== */
#selectorScreen { display: block; }
#slideScreen { display: none; }

.selector-header {
  text-align: center;
  padding: 20px 0 24px;
}
.selector-header h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
}
.selector-header p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
}

/* Current profile banner */
.current-profile-banner {
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: none;
}
.current-profile-banner.visible { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.cpb-left { display: flex; align-items: center; gap: 10px; }
.cpb-emoji { font-size: 24px; }
.cpb-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.cpb-name { font-size: 15px; font-weight: 700; color: var(--text); }
.cpb-continue {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.cpb-continue:hover { background: var(--accent-hover); }

/* Profile grid */
.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.profile-btn {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.profile-btn:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  background: #2e2e2e;
}
.profile-btn.selected {
  border-color: var(--accent);
  background: rgba(255,107,53,0.08);
}
.pb-emoji { font-size: 28px; line-height: 1; }
.pb-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
.pb-summary { font-size: 12px; color: var(--muted); line-height: 1.4; }

/* Quiz link */
.quiz-link-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.quiz-link-box p {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}
.quiz-link-box a {
  display: inline-block;
  background: none;
  border: 2px solid var(--accent);
  color: var(--accent);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s;
}
.quiz-link-box a:hover {
  background: var(--accent);
  color: white;
}

/* ===== SLIDE SCREEN ===== */
.slide-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 16px;
}
.slide-profile-badge {
  display: flex;
  align-items: center;
  gap: 8px;
}
.slide-profile-badge .badge-emoji { font-size: 20px; }
.slide-profile-badge .badge-name { font-size: 15px; font-weight: 700; color: var(--text); }

/* Progress dots */
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.dot.active {
  background: var(--accent);
  transform: scale(1.3);
}
.dot.visited {
  background: rgba(255,107,53,0.4);
}

/* Slide card */
.slide-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 24px 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
}

.slide-number {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--accent);
  margin-bottom: 12px;
}

.slide-emoji-display {
  font-size: 56px;
  text-align: center;
  margin-bottom: 16px;
  line-height: 1;
}

.slide-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}

.slide-subtitle {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 16px;
  line-height: 1.5;
}

.slide-body {
  flex: 1;
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
}

.slide-body ul {
  list-style: none;
  padding: 0;
}
.slide-body ul li {
  padding: 4px 0 4px 18px;
  position: relative;
  color: var(--text);
}
.slide-body ul li::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}

.slide-body ol {
  padding-left: 20px;
}
.slide-body ol li {
  padding: 5px 0;
  color: var(--text);
}

.highlight-box {
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 14px;
  font-size: 14px;
  line-height: 1.7;
}
.highlight-box.green {
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  color: var(--green-text);
}
.highlight-box.amber {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  color: var(--amber-text);
}
.highlight-box strong {
  display: block;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  opacity: 0.8;
}

.training-section {
  margin-bottom: 16px;
}
.training-section-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent);
  margin-bottom: 8px;
}

.cta-box {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-primary {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: background 0.2s;
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 12px;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: background 0.15s;
}
.btn-secondary:hover { background: #3a3a3a; }

/* Navigation buttons */
.slide-nav {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.nav-prev, .nav-next {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-prev {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.nav-prev:hover:not(:disabled) { background: #3a3a3a; }
.nav-prev:disabled { opacity: 0.35; cursor: default; }
.nav-next {
  background: var(--accent);
  color: white;
}
.nav-next:hover { background: var(--accent-hover); }

/* Mobile */
@media (max-width: 420px) {
  .profile-grid { grid-template-columns: 1fr; }
  .slide-title { font-size: 19px; }
  .slide-emoji-display { font-size: 44px; }
}
</style>
</head>

</div>

// ===== STATE =====
let currentProfileKey = null;
let currentSlide = 0;
const TOTAL_SLIDES = 5;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  renderProfileGrid();
  loadSavedProfile();
});

function renderProfileGrid() {
  const grid = document.getElementById('profileGrid');
  grid.innerHTML = Object.entries(profiles).map(([key, p]) => `
    <button class="profile-btn" id="btn-${key}" onclick="selectProfile('${key}')">
      <span class="pb-emoji">${p.emoji}</span>
      <span class="pb-name">${p.name}</span>
      <span class="pb-summary">${p.summary}</span>
    </button>
  `).join('');
}

function loadSavedProfile() {
  const saved = localStorage.getItem('selectedProfile');
  if (saved && profiles[saved]) {
    currentProfileKey = saved;
    highlightSelectedBtn(saved);
    // Show banner
    const banner = document.getElementById('currentProfileBanner');
    document.getElementById('cpbEmoji').textContent = profiles[saved].emoji;
    document.getElementById('cpbName').textContent = profiles[saved].name;
    banner.classList.add('visible');
  }
}

function highlightSelectedBtn(key) {
  document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.classList.add('selected');
}

function selectProfile(key) {
  currentProfileKey = key;
  currentSlide = 0;
  localStorage.setItem('selectedProfile', key);
  highlightSelectedBtn(key);
  showSlides();
}

function continueProfile() {
  if (currentProfileKey) {
    currentSlide = 0;
    showSlides();
  }
}

function showSlides() {
  document.getElementById('selectorScreen').style.display = 'none';
  document.getElementById('slideScreen').style.display = 'block';
  document.getElementById('headerBack').classList.add('visible');

  const p = profiles[currentProfileKey];
  document.getElementById('slideProfileEmoji').textContent = p.emoji;
  document.getElementById('slideProfileName').textContent = p.name;

  renderProgressDots();
  renderSlide(currentSlide);
}

function showSelector() {
  document.getElementById('slideScreen').style.display = 'none';
  document.getElementById('selectorScreen').style.display = 'block';
  document.getElementById('headerBack').classList.remove('visible');
}

function renderProgressDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  for (let i = 0; i < TOTAL_SLIDES; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === currentSlide ? ' active' : (i < currentSlide ? ' visited' : ''));
    dot.onclick = () => goToSlide(i);
    container.appendChild(dot);
  }
}

function goToSlide(index) {
  currentSlide = index;
  renderProgressDots();
  renderSlide(index);
}

function nextSlide() {
  if (currentSlide < TOTAL_SLIDES - 1) {
    currentSlide++;
    renderProgressDots();
    renderSlide(currentSlide);
  } else {
    // Reached the end of slides, mark as completed
    localStorage.setItem('onboardingCompleted', 'true');
  }
}

function prevSlide() {
  if (currentSlide > 0) {
    currentSlide--;
    renderProgressDots();
    renderSlide(currentSlide);
  }
}

function renderSlide(index) {
  const p = profiles[currentProfileKey];
  const slide = p.slides[index];
  const card = document.getElementById('slideCard');

  // Update nav buttons
  document.getElementById('navPrev').disabled = (index === 0);
  const nextBtn = document.getElementById('navNext');
  if (index === TOTAL_SLIDES - 1) {
    nextBtn.textContent = 'Start Training →';
    nextBtn.onclick = () => { window.location.href = '/app/'; };
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.onclick = nextSlide;
  }

  let html = '';

  html += `<div class="slide-number">Slide ${index + 1} of ${TOTAL_SLIDES}</div>`;

  if (slide.type === 'overview') {
    html += `<div class="slide-emoji-display">${p.emoji}</div>`;
    html += `<div class="slide-title">${slide.title}</div>`;
    html += `<div class="slide-subtitle">${slide.subtitle}</div>`;
    html += `<div class="slide-body">${slide.content}</div>`;

  } else if (slide.type === 'strength') {
    html += `<div class="slide-title">${slide.title}</div>`;
    html += `<div class="slide-subtitle">${slide.subtitle}</div>`;
    html += `<div class="slide-body">${slide.content}</div>`;

  } else if (slide.type === 'blindspot') {
    html += `<div class="slide-title">${slide.title}</div>`;
    html += `<div class="slide-subtitle">${slide.subtitle}</div>`;
    html += `<div class="slide-body">${slide.content}</div>`;

  } else if (slide.type === 'workon') {
    html += `<div class="slide-title">${slide.title}</div>`;
    html += `<div class="slide-subtitle">${slide.subtitle}</div>`;
    html += `<div class="slide-body">${slide.content}</div>`;

  } else if (slide.type === 'plan') {
    html += `<div class="slide-title">${slide.title}</div>`;
    html += `<div class="slide-subtitle">${slide.subtitle}</div>`;
    html += `<div class="slide-body">`;
    html += `<div class="training-section">`;
    html += `<div class="training-section-title">Recommended Training Focus</div>`;
    html += `<p style="font-size:14px;line-height:1.7;color:var(--text);margin-bottom:16px">${p.trainingFocus}</p>`;
    html += `</div>`;
    html += `<div class="training-section">`;
    html += `<div class="training-section-title">Next Steps</div>`;
    html += `<ul>` + p.nextSteps.map(s => `<li>${s}</li>`).join('') + `</ul>`;
    html += `</div>`;
    html += `<div class="cta-box">`;
    html += `<a href="/app/" class="btn-primary">Start Training →</a>`;
    html += `<a href="/quiz/" class="btn-secondary">Retake Quiz</a>`;
    html += `<button class="btn-secondary" onclick="showSelector()">Choose Different Profile</button>`;
    html += `</div>`;
    html += `</div>`;
  }

  card.innerHTML = html;

  // Scroll to top of card
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
