<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyzer | Signal Theory</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: #2a2a30;
    --text: #ffffff;
    --text-muted: #b8b8c8;
    --text-dim: rgba(255,255,255,0.65);
    --accent: #c0392b;
    --accent-light: #e74c3c;
    --green: #27ae60;
    --yellow: #f0a500;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* NAV */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-brand { font-weight: 700; font-size: 15px; color: var(--accent-light); }
  .nav-link { font-size: 13px; color: var(--text-muted); transition: color .2s; text-decoration: none; }
  .nav-link:hover { color: var(--text); }

  /* LAYOUT */
  .container { max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }

  /* HEADER */
  .page-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .page-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }

  /* INPUT SECTION */
  .input-section { margin-bottom: 20px; }
  .input-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .conversation-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-family: var(--font); line-height: 1.6; padding: 14px; border-radius: 10px; resize: vertical; min-height: 160px; transition: border-color .2s; }
  .conversation-input:focus { outline: none; border-color: var(--accent-light); }
  .conversation-input::placeholder { color: var(--text-dim); }

  /* ANALYZE BUTTON */
  .analyze-btn { width: 100%; background: var(--accent-light); color: #fff; font-size: 15px; font-weight: 700; padding: 13px 20px; border-radius: 10px; border: none; cursor: pointer; transition: opacity .2s; margin-bottom: 28px; }
  .analyze-btn:hover:not(:disabled) { opacity: .85; }
  .analyze-btn:disabled { opacity: .5; cursor: default; }

  /* LOADING */
  .thinking { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 14px; padding: 20px 0; justify-content: center; }
  .dots span { display: inline-block; width: 6px; height: 6px; background: var(--accent-light); border-radius: 50%; animation: bounce .8s infinite; margin-right: 4px; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ERROR */
  .error-msg { background: rgba(192,57,43,.15); border: 1px solid rgba(192,57,43,.4); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #e87060; margin-bottom: 20px; }

  /* RESULTS */
  .results { display: none; }
  .results.visible { display: block; }

  /* SIGNAL STATE */
  .signal-state-card { border-radius: 12px; padding: 20px 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
  .signal-state-card.positive { background: rgba(39,174,96,.12); border: 1px solid rgba(39,174,96,.3); }
  .signal-state-card.neutral { background: rgba(240,165,0,.1); border: 1px solid rgba(240,165,0,.25); }
  .signal-state-card.negative { background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.3); }
  .signal-state-card.ambiguous { background: rgba(136,136,160,.1); border: 1px solid rgba(136,136,160,.25); }
  .signal-icon { font-size: 28px; flex-shrink: 0; }
  .signal-info { flex: 1; }
  .signal-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-dim); margin-bottom: 3px; }
  .signal-value { font-size: 18px; font-weight: 700; }
  .signal-value.positive { color: var(--green); }
  .signal-value.neutral { color: var(--yellow); }
  .signal-value.negative { color: var(--accent-light); }
  .signal-value.ambiguous { color: var(--text-muted); }

  /* ANALYSIS SECTIONS */
  .analysis-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-dim); margin-bottom: 10px; }
  .section-body { font-size: 14px; line-height: 1.7; color: var(--text); }

  /* RECOMMENDED RESPONSE — highlighted */
  .analysis-section.recommended { background: rgba(231,76,60,.06); border-color: rgba(231,76,60,.25); }
  .analysis-section.recommended .section-label { color: var(--accent-light); }

  /* RESET BUTTON */
  .reset-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 9px; cursor: pointer; transition: all .2s; margin-top: 8px; }
  .reset-btn:hover { border-color: var(--text-muted); color: var(--text); }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">Signal Theory</span>
  <a href="/app/" class="nav-link">← Dashboard</a>
</nav>

<div class="container">
  <div class="page-title">Signal Analyzer</div>
  <p class="page-sub">Paste a conversation or describe a situation. Get a Signal Theory read on what's actually happening.</p>

  <div id="input-area">
    <div class="input-section">
      <div class="input-label">Conversation or situation</div>
      <textarea class="conversation-input" id="conversation-input" placeholder="Paste a text thread, describe what happened, or summarize the interaction — the more specific the observable behavior, the better the read."></textarea>
    </div>
    <div id="error-msg" class="error-msg" style="display:none"></div>
    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">Analyze Signal →</button>
  </div>

  <div id="thinking" class="thinking" style="display:none">
    <span class="dots"><span></span><span></span><span></span></span> Reading the signals...
  </div>

  <div class="results" id="results">
    <div id="signal-state-card" class="signal-state-card">
      <div class="signal-icon" id="signal-icon"></div>
      <div class="signal-info">
        <div class="signal-label">Signal State</div>
        <div class="signal-value" id="signal-value"></div>
      </div>
    </div>

    <div class="analysis-section">
      <div class="section-label">What I See</div>
      <div class="section-body" id="what-i-see"></div>
    </div>

    <div class="analysis-section">
      <div class="section-label">What It Means</div>
      <div class="section-body" id="what-it-means"></div>
    </div>

    <div class="analysis-section recommended">
      <div class="section-label">Your Move</div>
      <div class="section-body" id="your-move"></div>
    </div>

    <div class="analysis-section">
      <div class="section-label">Watch For</div>
      <div class="section-body" id="watch-for"></div>
    </div>

    <button class="reset-btn" onclick="resetForm()">← Analyze Another</button>
  </div>
</div>

<script>
const API_BASE = '';
let token = localStorage.getItem('signal_theory_token') || '';

if (!token) {
  window.location.href = '/app/';
}

const SIGNAL_CONFIG = {
  POSITIVE:  { icon: '🟢', label: 'Positive',  cls: 'positive' },
  NEUTRAL:   { icon: '🟡', label: 'Neutral',   cls: 'neutral'  },
  NEGATIVE:  { icon: '🔴', label: 'Negative',  cls: 'negative' },
  AMBIGUOUS: { icon: '⚪', label: 'Ambiguous', cls: 'ambiguous' },
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('analyze-btn').disabled = on;
  document.getElementById('conversation-input').disabled = on;
  document.getElementById('thinking').style.display = on ? 'flex' : 'none';
}

async function runAnalysis() {
  const input = document.getElementById('conversation-input').value.trim();
  hideError();

  if (!input) {
    showError('Please describe the situation or paste a conversation.');
    return;
  }
  if (input.length < 10) {
    showError('Please provide more detail for an accurate read.');
    return;
  }

  setLoading(true);

  try {
    const res = await fetch(API_BASE + '/api/analyze', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ input_text: input }),
    });

    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) { window.location.href = '/app/'; return; }
      throw new Error(data.error || 'Analysis failed. Please try again.');
    }

    displayResults(data.analysis);
  } catch (err) {
    showError(err.message || 'Something went wrong. Please try again.');
  } finally {
    setLoading(false);
  }
}

function displayResults(analysis) {
  const aiResponse = analysis.ai_response || analysis;
  const signalState = (aiResponse.signal_state || analysis.signal_state || 'NEUTRAL').toUpperCase();
  const config = SIGNAL_CONFIG[signalState] || SIGNAL_CONFIG['NEUTRAL'];

  const card = document.getElementById('signal-state-card');
  card.className = 'signal-state-card ' + config.cls;
  document.getElementById('signal-icon').textContent = config.icon;
  const valEl = document.getElementById('signal-value');
  valEl.textContent = config.label;
  valEl.className = 'signal-value ' + config.cls;

  document.getElementById('what-i-see').textContent = aiResponse.what_i_see || '—';
  document.getElementById('what-it-means').textContent = aiResponse.what_it_means || '—';
  document.getElementById('your-move').textContent = aiResponse.your_move || '—';
  document.getElementById('watch-for').textContent = aiResponse.watch_for || '—';

  document.getElementById('input-area').style.display = 'none';
  document.getElementById('results').classList.add('visible');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('input-area').style.display = 'block';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('conversation-input').value = '';
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
