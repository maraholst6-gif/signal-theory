<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenario | Signal Theory</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: #2a2a30;
    --text: #ffffff;
    --text-muted: #b8b8c8;
    --text-dim: rgba(255,255,255,0.65);
    --accent: #c0392b;
    --accent-light: #e74c3c;
    --green: #27ae60;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* NAV */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-brand { font-weight: 700; font-size: 15px; color: var(--accent-light); }
  .nav-back { font-size: 13px; color: var(--text-muted); cursor: pointer; transition: color .2s; }
  .nav-back:hover { color: var(--text); }

  /* LAYOUT */
  .container { max-width: 680px; margin: 0 auto; padding: 24px 20px 60px; }

  /* SCENARIO HEADER */
  .scenario-header { margin-bottom: 24px; }
  .scenario-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .scenario-setup { font-size: 15px; color: var(--text-muted); line-height: 1.6; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }

  /* TURN COUNTER */
  .turn-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .turn-label { font-size: 13px; color: var(--text-muted); }
  .turn-pips { display: flex; gap: 6px; }
  .pip { width: 32px; height: 6px; border-radius: 3px; background: var(--border); transition: background .3s; }
  .pip.done { background: var(--accent); }
  .pip.current { background: var(--accent-light); }

  /* CONVERSATION THREAD */
  .conversation-thread { margin-bottom: 20px; }
  .thread-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); margin-bottom: 10px; }
  .thread-turn { margin-bottom: 10px; }
  .thread-you { font-size: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px 8px 2px 8px; padding: 10px 12px; margin-bottom: 4px; }
  .thread-you-label { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 3px; }
  .thread-her { font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 2px 8px 8px 8px; padding: 10px 12px; color: var(--text-muted); font-style: italic; }
  .thread-her-label { font-size: 10px; font-weight: 700; color: var(--accent-light); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 3px; font-style: normal; }

  /* SITUATION CARD */
  .situation-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
  .situation-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); margin-bottom: 10px; }
  .situation-text { font-size: 15px; line-height: 1.65; color: var(--text); }

  /* OPTIONS */
  .options-section { margin-bottom: 16px; }
  .options-label { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
  .option-btn { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; line-height: 1.5; padding: 13px 16px; border-radius: 10px; cursor: pointer; text-align: left; margin-bottom: 8px; transition: border-color .2s, background .2s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent-light); background: var(--surface2); }
  .option-btn:disabled { opacity: .5; cursor: default; }
  .option-btn.selected { border-color: var(--accent-light); background: rgba(231,76,60,.1); }

  /* CUSTOM INPUT */
  .custom-section { margin-bottom: 24px; }
  .custom-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .custom-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-family: var(--font); line-height: 1.5; padding: 12px 14px; border-radius: 10px; resize: vertical; min-height: 80px; transition: border-color .2s; }
  .custom-input:focus { outline: none; border-color: var(--accent-light); }
  .custom-input::placeholder { color: var(--text-dim); }
  .custom-input:disabled { opacity: .6; cursor: not-allowed; }

  /* ACTIONS */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 11px 20px; border-radius: 9px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: opacity .2s; }
  .btn-primary { background: var(--accent-light); color: #fff; flex: 1; }
  .btn-primary:hover:not(:disabled) { opacity: .85; }
  .btn-primary:disabled { opacity: .5; cursor: default; }
  .btn-disengage { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 11px 16px; }
  .btn-disengage:hover:not(:disabled) { border-color: var(--text-muted); color: var(--text); }
  .btn-disengage:disabled { opacity: .5; cursor: default; }

  /* LOADING */
  .thinking { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 14px; padding: 16px 0; }
  .dots span { display: inline-block; width: 6px; height: 6px; background: var(--accent-light); border-radius: 50%; animation: bounce .8s infinite; margin-right: 4px; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .error-msg { background: rgba(192,57,43,.15); border: 1px solid rgba(192,57,43,.4); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #e87060; margin-bottom: 16px; }

  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 80px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PREVIEW */
  .preview-container { padding: 8px 0; }
  .preview-cat-badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; padding: 4px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); margin-bottom: 14px; }
  .preview-title { font-size: 24px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; color: var(--text); }
  .preview-setup { font-size: 15px; line-height: 1.7; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 10px; }
  .preview-hint { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }
  .preview-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .preview-begin { background: var(--accent-light); color: #fff; padding: 13px 28px; border-radius: 9px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; transition: opacity .2s; }
  .preview-begin:hover { opacity: .85; }
  .preview-back { font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 8px 0; }
  .preview-back:hover { color: var(--text); }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">Signal Theory</span>
  <span class="nav-back" onclick="confirmExit()">← Back to Scenarios</span>
</nav>

<div class="container" id="app">
  <div class="spinner"></div>
</div>

<script>
const API_BASE = '';
let token = localStorage.getItem('signal_theory_token') || '';

const CATEGORY_LABELS = {
  text: 'Text & App',
  in_person: 'In Person',
  post_relationship: 'Ambiguous',
  processing_loss: 'Processing Loss',
};

// Session state
let state = {
  session_id: null,
  scenario_title: '',
  scenario_setup: '',
  turn: 1,
  history: [],
  current_situation: '',
  suggested_responses: [],
  custom_input_value: '',
  loading: false,
  error: null,
  complete: false,
};

function saveState() {
  localStorage.setItem('active_scenario', JSON.stringify({
    session_id: state.session_id,
    scenario_title: state.scenario_title,
    turn: state.turn,
    history: state.history,
  }));
}

async function apiCall(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + endpoint, opts);
  const data = await res.json();
  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function confirmExit() {
  if (!state.session_id || state.complete) {
    localStorage.removeItem('active_scenario');
    window.location.href = '/app/scenarios.html';
    return;
  }
  if (confirm('End this scenario and get feedback on what you\'ve done so far?')) {
    endScenario('user_disengaged');
  }
}

function renderTurnPips() {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const cls = i < state.turn ? 'done' : i === state.turn ? 'current' : '';
    html += `<div class="pip ${cls}"></div>`;
  }
  return html;
}

function render() {
  // Preserve textarea value before re-render
  const existingInput = document.getElementById('custom-response');
  if (existingInput) {
    state.custom_input_value = existingInput.value;
  }

  // Loading or error before session starts
  if (!state.session_id) {
    if (state.loading) {
      document.getElementById('app').innerHTML = '<div class="spinner"></div>';
    } else if (state.error) {
      document.getElementById('app').innerHTML = `<div class="error-msg" style="margin-top:40px">${state.error}</div>`;
    } else {
      document.getElementById('app').innerHTML = '<div class="spinner"></div>';
    }
    return;
  }

  // Conversation history (all previous turns)
  const conversationThreadHtml = state.history.length > 0
    ? `<div class="conversation-thread">
        <div class="thread-label">Conversation so far</div>
        ${state.history.map(turn => `
          <div class="thread-turn">
            <div class="thread-you">
              <div class="thread-you-label">You</div>
              ${escapeHtml(turn.user)}
            </div>
            <div class="thread-her">
              <div class="thread-her-label">Her</div>
              ${escapeHtml(turn.her)}
            </div>
          </div>
        `).join('')}
      </div>` : '';

  const optionsHtml = state.suggested_responses.map((opt, i) =>
    `<button class="option-btn" onclick="selectOption(${i})" ${state.loading ? 'disabled' : ''}>${escapeHtml(opt)}</button>`
  ).join('');

  const errorHtml = state.error
    ? `<div class="error-msg">${state.error}</div>` : '';

  const thinkingHtml = state.loading
    ? `<div class="thinking"><span class="dots"><span></span><span></span><span></span></span> Thinking...</div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="scenario-header">
      <div class="scenario-title">${escapeHtml(state.scenario_title)}</div>
      <div class="scenario-setup">${escapeHtml(state.scenario_setup)}</div>
    </div>

    <div class="turn-bar">
      <span class="turn-label">Turn ${Math.min(state.turn, 5)} of 5</span>
      <div class="turn-pips">${renderTurnPips()}</div>
    </div>

    ${conversationThreadHtml}

    <div class="situation-card">
      <div class="situation-label">Current situation</div>
      <div class="situation-text">${escapeHtml(state.current_situation)}</div>
    </div>

    ${errorHtml}
    ${thinkingHtml}

    <div class="options-section">
      <div class="options-label">Choose a response — or write your own below:</div>
      ${optionsHtml}
    </div>

    <div class="custom-section">
      <div class="custom-label">Your own response:</div>
      <textarea class="custom-input" id="custom-response" ${state.loading ? 'disabled' : ''} placeholder="Type what you would actually say or do...">${escapeHtml(state.custom_input_value)}</textarea>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="submitCustom()" ${state.loading ? 'disabled' : ''}>Send Response</button>
      <button class="btn btn-disengage" onclick="confirmDisengage()" ${state.loading ? 'disabled' : ''}>Disengage</button>
    </div>
  `;
}

function selectOption(index) {
  const text = state.suggested_responses[index];
  state.custom_input_value = text;
  const input = document.getElementById('custom-response');
  if (input) input.value = text;
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === index);
  });
}

async function submitCustom() {
  const input = document.getElementById('custom-response');
  const text = input ? input.value.trim() : '';
  if (!text) {
    state.error = 'Please select an option or write your own response.';
    render();
    return;
  }
  await submitTurn(text);
}

async function submitTurn(userResponse) {
  state.loading = true;
  state.error = null;
  state.custom_input_value = '';
  render();

  try {
    const data = await apiCall('/api/scenario-play/turn', 'POST', {
      session_id: state.session_id,
      user_response: userResponse,
    });

    state.current_situation = data.situation;
    state.suggested_responses = data.suggested_responses || [];
    state.turn = data.turn;
    state.history.push({ user: userResponse, her: data.her_response });
    saveState();

    if (data.scenario_complete) {
      state.complete = true;
      await endScenario('turns_completed');
      return;
    }
  } catch (err) {
    state.error = err.message || 'Something went wrong. Please try again.';
    if (err.status === 401) { window.location.href = '/app/'; return; }
  } finally {
    state.loading = false;
  }

  render();
}

function confirmDisengage() {
  if (confirm('End the scenario here and get your breakdown?')) {
    endScenario('user_disengaged');
  }
}

async function endScenario(reason) {
  state.loading = true;
  state.error = null;
  render();

  try {
    const data = await apiCall('/api/scenario-play/end', 'POST', {
      session_id: state.session_id,
      reason,
    });

    localStorage.setItem('st_scenario_result', JSON.stringify(data));
    localStorage.removeItem('active_scenario');
    window.location.href = '/app/scenario-result.html';
  } catch (err) {
    state.loading = false;
    state.error = err.message || 'Failed to generate analysis. Please try again.';
    render();
  }
}

async function startScenario() {
  const scenarioId = localStorage.getItem('st_pending_scenario_id');
  const customSetup = localStorage.getItem('st_pending_custom_setup');

  if (!scenarioId && !customSetup) {
    window.location.href = '/app/scenarios.html';
    return;
  }

  state.loading = true;
  render();

  try {
    const body = {};
    if (scenarioId) body.scenario_id = scenarioId;
    if (customSetup) body.custom_setup = customSetup;

    const data = await apiCall('/api/scenario-play/start', 'POST', body);

    state.session_id = data.session_id;
    state.scenario_title = data.scenario.title;
    state.scenario_setup = data.scenario.setup;
    state.turn = data.turn;
    state.current_situation = data.situation;
    state.suggested_responses = data.suggested_responses || [];

    localStorage.removeItem('st_pending_scenario_id');
    localStorage.removeItem('st_pending_custom_setup');
    localStorage.removeItem('st_pending_scenario_data');
    saveState();
  } catch (err) {
    if (err.code === 'LIMIT_REACHED') {
      alert('You\'ve reached your weekly limit. Upgrade for unlimited scenarios.');
      window.location.href = '/app/scenarios.html';
      return;
    }
    if (err.code === 'PREMIUM_REQUIRED') {
      alert('This scenario requires a premium account.');
      window.location.href = '/app/scenarios.html';
      return;
    }
    if (err.status === 401) { window.location.href = '/app/'; return; }
    state.error = err.message || 'Failed to start scenario.';
  } finally {
    state.loading = false;
  }

  render();
}

// ── Preview mode ──────────────────────────────────────────

function showPreview() {
  let scenarioData = null;
  try {
    scenarioData = JSON.parse(localStorage.getItem('st_pending_scenario_data') || 'null');
  } catch (e) {}

  if (!scenarioData) {
    // No preview data — fall through to normal start
    startScenario();
    return;
  }

  const catLabel = CATEGORY_LABELS[scenarioData.category] || '';

  document.getElementById('app').innerHTML = `
    <div class="preview-container">
      ${catLabel ? `<div class="preview-cat-badge">${catLabel}</div>` : ''}
      <div class="preview-title">${escapeHtml(scenarioData.title)}</div>
      <div class="preview-setup">${escapeHtml(scenarioData.setup)}</div>
      <p class="preview-hint">5 turns to navigate this interaction. Signal Theory analyzes your responses at the end.</p>
      <div class="preview-actions">
        <button class="preview-begin" onclick="beginFromPreview()">Begin Scenario →</button>
        <span class="preview-back" onclick="window.location.href='/app/scenarios.html'">← Back to Scenarios</span>
      </div>
    </div>
  `;
}

function beginFromPreview() {
  localStorage.removeItem('st_pending_scenario_data');
  const url = new URL(window.location.href);
  url.searchParams.delete('preview');
  window.history.replaceState({}, '', url.toString());
  startScenario();
}

// ── Init ──────────────────────────────────────────────────

if (!token) {
  window.location.href = '/app/';
} else {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('preview') === '1') {
    showPreview();
  } else {
    startScenario();
  }
}
</script>
</body>
</html>
