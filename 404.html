<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Signal Theory</title>
  <script>
    // GitHub Pages SPA redirect for /quiz/ routes
    // Stores the path in sessionStorage and redirects to /quiz/
    // The app's index.html restores the route on load
    var path = window.location.pathname;
    if (path.startsWith('/quiz/')) {
      var route = path.replace('/quiz', '');
      var search = window.location.search;
      sessionStorage.setItem('spa-redirect', route + search);
      window.location.replace('/quiz/');
    }
  </script>
</head>
<body>
</body>
</html>
